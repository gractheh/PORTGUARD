<?xml version="1.0" encoding="UTF-8"?>
<!--
  PortGuard Icon — Cargo Ship Logomark
  Canvas: 200 × 120  (5 : 3)
  Key reference lines:
    Deck      y = 65
    Waterline y = 79
    Keel      y = 87
  Container rows (above deck):
    Row 1     y = 51 – 65  (h = 14)
    Row 2     y = 37 – 51  (h = 14)
    Row 3     y = 25 – 37  (h = 12)  tallest stacks only
  Column width = 18 px, column gap = 4 px
  Colors: teal hull #1B9AAA, coral containers #C0392B,
          amber containers #E8A838, bright teal containers #22B5C8
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="none"
     role="img" aria-label="PortGuard — Autonomous Customs Intelligence">

  <defs>
    <!-- Hull gradient: bright teal at deck → deep teal at keel -->
    <linearGradient id="pg-hull" x1="0" y1="65" x2="0" y2="87"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1B9AAA"/>
      <stop offset="52%"  stop-color="#0D7A8A"/>
      <stop offset="100%" stop-color="#072B30"/>
    </linearGradient>

    <!-- Bridge face gradient: gives slight depth to the superstructure -->
    <linearGradient id="pg-bridge" x1="0" y1="45" x2="0" y2="65"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1E3A6E"/>
      <stop offset="100%" stop-color="#0F2040"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════════════════════════
       WATER — atmosphere beneath the ship
       ═══════════════════════════════════════════════════════ -->

  <!-- Primary teal glow ellipse — suggests reflection on dark water -->
  <ellipse cx="92" cy="94" rx="88" ry="13" fill="#1B9AAA" opacity="0.18"/>
  <!-- Secondary inner glow — tighter, brighter -->
  <ellipse cx="92" cy="91" rx="66" ry="7"  fill="#22B5C8" opacity="0.10"/>

  <!-- Wake ripples: three horizontal lines, fading into the distance -->
  <line x1="12"  y1="98"  x2="178" y2="98"
        stroke="#4DCFDF" stroke-width="1.3" stroke-linecap="round" opacity="0.22"/>
  <line x1="26"  y1="103" x2="164" y2="103"
        stroke="#4DCFDF" stroke-width="0.85" stroke-linecap="round" opacity="0.14"/>
  <line x1="40"  y1="108" x2="150" y2="108"
        stroke="#4DCFDF" stroke-width="0.6"  stroke-linecap="round" opacity="0.08"/>

  <!-- ═══════════════════════════════════════════════════════
       HULL SILHOUETTE
       Bow faces left. Stern (with bridge) faces right.
       ═══════════════════════════════════════════════════════ -->

  <!-- Main hull body: 6-point polygon -->
  <!-- Bow: deck (22,65) → waterline tip (8,78) → keel (12,87)           -->
  <!-- Stern: keel (173,87) → step (176,77) → deck (167,65)              -->
  <path d="M 22,65 L 8,78 L 12,87 L 173,87 L 176,77 L 167,65 Z"
        fill="url(#pg-hull)"/>

  <!-- Keel accent: very dark strip along the waterline bottom -->
  <path d="M 12,84 L 10,80 L 8,78 L 12,87 L 173,87 L 176,84 Z"
        fill="#041520" opacity="0.55"/>

  <!-- Waterline accent: bright teal line where hull meets sea -->
  <line x1="10"  y1="79" x2="175" y2="79"
        stroke="#4DCFDF" stroke-width="1.5" stroke-linecap="round" opacity="0.68"/>

  <!-- Deck top edge: subtle highlight separating hull from sky -->
  <line x1="22"  y1="65" x2="167" y2="65"
        stroke="#22B5C8" stroke-width="0.8" opacity="0.28"/>

  <!-- ═══════════════════════════════════════════════════════
       BRIDGE / SUPERSTRUCTURE  (stern, x = 135 – 163)
       ═══════════════════════════════════════════════════════ -->

  <!-- Main block -->
  <rect x="135" y="45" width="28" height="20" rx="2" fill="url(#pg-bridge)"/>

  <!-- Navigation light strip along the bridge top -->
  <rect x="135" y="45" width="28" height="3.5" rx="1" fill="#22B5C8" opacity="0.38"/>

  <!-- Bridge windows: three lit portholes -->
  <rect x="139" y="52" width="4"   height="3.5" rx="0.5" fill="#4DCFDF" opacity="0.58"/>
  <rect x="146" y="52" width="4"   height="3.5" rx="0.5" fill="#4DCFDF" opacity="0.58"/>
  <rect x="153" y="52" width="4"   height="3.5" rx="0.5" fill="#4DCFDF" opacity="0.58"/>

  <!-- Bridge lower ledge: subtle teal shadow where bridge meets deck -->
  <rect x="133" y="63" width="34" height="2" rx="0" fill="#0D6B7A" opacity="0.38"/>

  <!-- ═══════════════════════════════════════════════════════
       FUNNEL  (above bridge)
       ═══════════════════════════════════════════════════════ -->

  <!-- Funnel body: coral red, the brand's secondary color -->
  <rect x="150" y="35" width="8"  height="12" rx="1.5" fill="#C0392B"/>
  <!-- Dark cap at top — smoke opening -->
  <rect x="150" y="35" width="8"  height="3"  rx="1"   fill="#041520" opacity="0.42"/>
  <!-- Amber accent band: the sunset-gold trim stripe -->
  <rect x="150" y="43" width="8"  height="2"  rx="0"   fill="#E8A838" opacity="0.92"/>

  <!-- ═══════════════════════════════════════════════════════
       CONTAINERS
       5 columns — pyramid profile (tallest in center,
       tapering down toward bow and stern)
       ═══════════════════════════════════════════════════════ -->

  <!-- ── Column 1: x = 24–42  ──  2 rows high ── -->
  <!-- Row 1 — coral -->
  <rect x="24" y="51" width="18" height="14" rx="1" fill="#C0392B"/>
  <line x1="24" y1="57"  x2="42" y2="57"  stroke="white" stroke-width="0.55" opacity="0.20"/>
  <line x1="24" y1="62"  x2="42" y2="62"  stroke="white" stroke-width="0.55" opacity="0.13"/>
  <!-- Row 2 — amber -->
  <rect x="24" y="37" width="18" height="14" rx="1" fill="#E8A838"/>
  <line x1="24" y1="43"  x2="42" y2="43"  stroke="white" stroke-width="0.55" opacity="0.20"/>
  <line x1="24" y1="48"  x2="42" y2="48"  stroke="white" stroke-width="0.55" opacity="0.13"/>

  <!-- ── Column 2: x = 46–64  ──  3 rows high ── -->
  <!-- Row 1 — amber -->
  <rect x="46" y="51" width="18" height="14" rx="1" fill="#E8A838"/>
  <line x1="46" y1="57"  x2="64" y2="57"  stroke="white" stroke-width="0.55" opacity="0.20"/>
  <line x1="46" y1="62"  x2="64" y2="62"  stroke="white" stroke-width="0.55" opacity="0.13"/>
  <!-- Row 2 — coral -->
  <rect x="46" y="37" width="18" height="14" rx="1" fill="#C0392B"/>
  <line x1="46" y1="43"  x2="64" y2="43"  stroke="white" stroke-width="0.55" opacity="0.20"/>
  <line x1="46" y1="48"  x2="64" y2="48"  stroke="white" stroke-width="0.55" opacity="0.13"/>
  <!-- Row 3 — bright teal (topmost) -->
  <rect x="47" y="25" width="16" height="12" rx="1" fill="#22B5C8"/>
  <line x1="47" y1="30"  x2="63" y2="30"  stroke="white" stroke-width="0.55" opacity="0.24"/>

  <!-- ── Column 3: x = 68–86  ──  3 rows high ── -->
  <!-- Row 1 — bright teal -->
  <rect x="68" y="51" width="18" height="14" rx="1" fill="#22B5C8"/>
  <line x1="68" y1="57"  x2="86" y2="57"  stroke="white" stroke-width="0.55" opacity="0.20"/>
  <line x1="68" y1="62"  x2="86" y2="62"  stroke="white" stroke-width="0.55" opacity="0.13"/>
  <!-- Row 2 — coral -->
  <rect x="68" y="37" width="18" height="14" rx="1" fill="#C0392B"/>
  <line x1="68" y1="43"  x2="86" y2="43"  stroke="white" stroke-width="0.55" opacity="0.20"/>
  <line x1="68" y1="48"  x2="86" y2="48"  stroke="white" stroke-width="0.55" opacity="0.13"/>
  <!-- Row 3 — amber (topmost) -->
  <rect x="69" y="25" width="16" height="12" rx="1" fill="#E8A838"/>
  <line x1="69" y1="30"  x2="85" y2="30"  stroke="white" stroke-width="0.55" opacity="0.20"/>

  <!-- ── Column 4: x = 90–108  ──  2 rows high ── -->
  <!-- Row 1 — coral -->
  <rect x="90" y="51" width="18" height="14" rx="1" fill="#C0392B"/>
  <line x1="90"  y1="57" x2="108" y2="57" stroke="white" stroke-width="0.55" opacity="0.20"/>
  <line x1="90"  y1="62" x2="108" y2="62" stroke="white" stroke-width="0.55" opacity="0.13"/>
  <!-- Row 2 — bright teal -->
  <rect x="90" y="37" width="18" height="14" rx="1" fill="#22B5C8"/>
  <line x1="90"  y1="43" x2="108" y2="43" stroke="white" stroke-width="0.55" opacity="0.20"/>
  <line x1="90"  y1="48" x2="108" y2="48" stroke="white" stroke-width="0.55" opacity="0.13"/>

  <!-- ── Column 5: x = 112–128  ──  1 row (taper toward bridge) ── -->
  <!-- Row 1 — amber -->
  <rect x="112" y="51" width="16" height="14" rx="1" fill="#E8A838"/>
  <line x1="112" y1="57" x2="128" y2="57" stroke="white" stroke-width="0.55" opacity="0.20"/>
  <line x1="112" y1="62" x2="128" y2="62" stroke="white" stroke-width="0.55" opacity="0.13"/>

</svg>

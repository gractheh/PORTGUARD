# render.yaml — Render Blueprint for PortGuard
#
# This file defines the web service and PostgreSQL database as a single
# Blueprint so both resources are created together from the Render dashboard.
#
# One-click deploy:
#   1. Push this file to GitHub (already done).
#   2. In the Render dashboard → New → Blueprint → select this repo.
#   3. Render creates the database first, then the web service with
#      DATABASE_URL automatically wired from the database's connection string.
#   4. Set PORTGUARD_JWT_SECRET manually in the web service's Environment tab
#      (or let the auto-generated value stand for staging deployments).
#   5. Hit Deploy — all tables are created automatically on first startup.

services:
  - type: web
    name: portguard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn api.app:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      # Linked automatically from the portguard-db database defined below.
      # Render provides a postgres:// URL; portguard/db.py normalises it to
      # postgresql:// before passing it to SQLAlchemy.
      - key: DATABASE_URL
        fromDatabase:
          name: portguard-db
          property: connectionString

      # JWT signing key — set this manually in the Render dashboard for
      # production.  If left unset a random key is generated on each restart
      # (all sessions invalidated on every redeploy).
      # Generate with: python -c "import secrets; print(secrets.token_hex(32))"
      - key: PORTGUARD_JWT_SECRET
        generateValue: true

      # Pattern learning is enabled by default.
      # Set to "false" to run rule-engine-only mode.
      - key: PORTGUARD_PATTERN_LEARNING_ENABLED
        value: "true"

databases:
  - name: portguard-db
    databaseName: portguard
    user: portguard
    plan: starter
